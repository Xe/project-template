name: Go

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  POSTGRES_USER: admin
  POSTGRES_PASSWORD: hunter2
  POSTGRES_DB: project
  DATABASE_URL: postgresql://admin:hunter2@127.0.0.1/project?sslmode=disable

jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-tags: true
          fetch-depth: 0

      - run: |
          docker run --rm -dit --name postgres -e POSTGRES_USER=admin -e POSTGRES_PASSWORD=hunter2 -e POSTGRES_DB=project -p 5432:5432 postgres:16

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22

      - run: node --version

      - name: Install deps
        run: npm ci

      - uses: actions/setup-go@0aaccfd150d50ccaeb58ebd88d36e91967a5f35b # v5.4.0
        with:
          go-version: "stable"

      - name: Setup Go caches
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-golang-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-golang-

      - name: Test
        run: npm run test

      - name: Cleanup postgres
        run: docker rm -f postgres
